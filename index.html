<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMZA RADAR LIVE</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; height: 100vh; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .rocket { font-size: 60px; animation: move 1s infinite alternate; }
        @keyframes move { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        .card { border: 2px solid #2ecc71; padding: 30px; border-radius: 20px; background: rgba(255,255,255,0.05); box-shadow: 0 0 20px #2ecc71; width: 80%; max-width: 400px; }
        #prediction { font-size: 80px; font-weight: bold; color: #2ecc71; margin: 10px 0; }
        .status { color: #00ff00; font-size: 13px; }
        .dot { height: 10px; width: 10px; background: #0f0; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="rocket">🚀</div>
    <div class="card">
        <h2 style="color:#888; font-size:16px;">1XBET CRASH PREDICTION</h2>
        <div id="prediction">--x</div>
        <div class="status"><span class="dot"></span> LIVE ANALYSIS ACTIVE</div>
    </div>
    <script>
        const dataUrl = "https://raw.githubusercontent.com/Hamzahassou/xbit-radar/main/data.json";
        async function fetchSignal() {
            try {
                const r = await fetch(dataUrl + "?t=" + Date.now());
                const d = await r.json();
                if(d.signal) document.getElementById('prediction').innerText = d.signal + "x";
            } catch (e) { console.log("Error fetching data"); }
        }
        setInterval(fetchSignal, 5000);
        fetchSignal();
    </script>
</body>
</html>
