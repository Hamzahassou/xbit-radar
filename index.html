<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMZA 1X-RADAR LIVE</title>
    <style>
        body { background: radial-gradient(circle, #050505, #000); color: white; text-align: center; font-family: 'Arial', sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .rocket-box { font-size: 80px; animation: fly 2s infinite ease-in-out; }
        @keyframes fly { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        #res { font-size: 70px; font-weight: bold; color: #00ff00; text-shadow: 0 0 30px #00ff00; }
        .info { border: 1px solid #333; padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.05); width: 80%; }
        .status-dot { height: 10px; width: 10px; background-color: #00ff00; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="rocket-box">🚀</div>
    <div class="info">
        <div style="color: #888; font-size: 14px;">1XBET CRASH PREDICTION</div>
        <div id="res">--x</div>
        <div style="font-size: 12px;"><span class="status-dot"></span> LIVE ANALYSIS ACTIVE</div>
    </div>
    <script>
        // دالة لجلب البيانات من ملف JSON سنقوم بتحديثه عبر البوت
        async function fetchSignal() {
            try {
                // ملاحظة: سنستخدم رابط ملف raw من مستودعك لتحديث البيانات
                const response = await fetch('https://raw.githubusercontent.com/Hamzahassou/xbit-radar/main/data.json?' + Math.random());
                const data = await response.json();
                document.getElementById('res').innerText = data.signal + "x";
            } catch (e) { console.log("Searching for signal..."); }
        }
        setInterval(fetchSignal, 3000); // تحديث كل 3 ثوانٍ
    </script>
</body>
</html>
