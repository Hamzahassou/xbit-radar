<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>1XBET LIVE RADAR</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: Arial; }
        .rocket { font-size: 80px; margin-top: 50px; }
        .box { border: 1px solid #333; padding: 20px; border-radius: 15px; display: inline-block; margin-top: 20px; background: #111; }
        #prediction { color: #0f0; font-size: 48px; font-weight: bold; text-shadow: 0 0 10px #0f0; }
        .status { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="rocket">🚀</div>
    <div class="box">
        <p>1XBET CRASH PREDICTION</p>
        <div id="prediction">--X</div>
        <div class="status">● LIVE ANALYSIS ACTIVE</div>
    </div>

    <script>
        async function fetchSignal() {
            try {
                // استبدل الرابط برابط ملف data.json الخاص بك على GitHub
                const url = "https://raw.githubusercontent.com/Hamzahassou/xbit-radar/main/data.json";
                const response = await fetch(url + "?t=" + new Date().getTime());
                const data = await response.json();
                
                // تحديث الرقم في الواجهة
                document.getElementById('prediction').innerText = data.signal + "X";
            } catch (e) {
                console.log("جاري الانتظار...");
            }
        }

        // تحديث البيانات كل 5 ثوانٍ
        setInterval(fetchSignal, 5000);
        fetchSignal();
    </script>
</body>
</html>
