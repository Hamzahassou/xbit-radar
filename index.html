<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMZA DARK RADAR V12</title>
    <style>
        body { background: #050505; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .container { border: 2px solid #ff0000; padding: 40px; border-radius: 30px; background: rgba(255, 0, 0, 0.03); box-shadow: 0 0 50px rgba(255, 0, 0, 0.3); width: 85%; max-width: 400px; position: relative; }
        
        /* تأثير الجمجمة */
        .skull { font-size: 70px; margin-bottom: 10px; filter: drop-shadow(0 0 15px #ff0000); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

        /* الرادار الدائري */
        .radar-circle { width: 190px; height: 190px; border: 4px solid #ff0000; border-radius: 50%; margin: 25px auto; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: inset 0 0 40px #ff0000, 0 0 30px #ff0000; }
        .radar-circle::after { content: ''; position: absolute; width: 100%; height: 100%; border: 2px dashed #ff0000; border-radius: 50%; animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #prediction { font-size: 75px; font-weight: bold; text-shadow: 0 0 25px #ff0000; z-index: 10; }

        /* الصاروخ المهتز */
        .rocket { font-size: 45px; position: absolute; top: -20px; right: -20px; display: none; animation: vibrate 0.15s infinite; }
        @keyframes vibrate { 0% { transform: translate(0); } 25% { transform: translate(2px, -2px); } 50% { transform: translate(-2px, 2px); } 75% { transform: translate(2px, 2px); } 100% { transform: translate(0); } }

        .btn { background: #ff0000; color: #000; padding: 18px 45px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; font-size: 20px; box-shadow: 0 0 25px #ff0000; transition: 0.4s; width: 100%; }
        .btn:hover { background: #fff; box-shadow: 0 0 50px #fff; transform: translateY(-3px); }
        .status { margin-top: 20px; font-size: 11px; letter-spacing: 2px; color: #444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="rocket" id="rocket">🚀</div>
        <div class="skull">💀</div>
        <div style="font-size: 12px; opacity: 0.6;">DARK_INJECTION_V12</div>
        <div class="radar-circle">
            <div id="prediction">--x</div>
        </div>
        <button class="btn" id="startBtn" onclick="activateRadar()">ACTIVATE RADAR</button>
        <div class="status" id="status">SYSTEM IDLE</div>
    </div>

    <script>
        async function fetchSignal() {
            try {
                // إضافة التوقيت الزمني لمنع التخزين المؤقت (Cache)
                const url = 'https://raw.githubusercontent.com/Hamzahassou/xbit-radar/main/data.json?nocache=' + new Date().getTime();
                const response = await fetch(url);
                const data = await response.json();
                if (data.signal) {
                    document.getElementById('prediction').innerText = data.signal + "x";
                }
            } catch (err) { console.error("Update Failed"); }
        }

        function activateRadar() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('rocket').style.display = 'block';
            document.getElementById('status').innerText = "STATUS: INJECTING SIGNALS...";
            document.getElementById('status').style.color = "#ff0000";
            setInterval(fetchSignal, 1500); // تحديث سريع كل 1.5 ثانية
        }
    </script>
</body>
</html>
