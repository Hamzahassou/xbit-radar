<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMZA PRO RADAR</title>
    <style>
        body { background: #000; color: #ff0000; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 20px; border: 1px solid #ff0000; display: inline-block; padding: 5px 15px; }
        .radar { width: 220px; height: 220px; border: 3px solid #ff0000; border-radius: 50%; margin: 0 auto; position: relative; box-shadow: 0 0 20px #ff0000; }
        .line { position: absolute; width: 50%; height: 2px; background: #ff0000; top: 50%; left: 50%; transform-origin: left; animation: scan 2s linear infinite; }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .prediction { font-size: 45px; font-weight: bold; margin-top: 20px; color: white; }
        #hash { font-size: 10px; color: #444; margin-top: 15px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="logo">HAMZA PRO 🚀</div>
    <div class="radar"><div class="line"></div></div>
    <div class="prediction" id="sig">جاري التحليل...</div>
    <div id="hash">Hash: Connecting...</div>

    <script>
        async function update() {
            try {
                // جلب البيانات التي يحدثها Termux
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                document.getElementById('sig').innerText = data.signal;
                document.getElementById('hash').innerText = "SHA-256: " + data.hash;
            } catch(e) {}
        }
        setInterval(update, 5000);
    </script>
</body>
</html>
