<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMZA RADAR LIVE</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 2px solid #00ff00; padding: 20px; border-radius: 15px; width: 80%; margin: auto; box-shadow: 0 0 20px #00ff00; }
        #number { font-size: 70px; font-weight: bold; color: #00ff00; margin: 20px 0; }
        .btn { background: #00ff00; color: #000; padding: 15px 30px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h3>1XBET CRASH RADAR</h3>
        <div id="number">--x</div>
        <button class="btn" onclick="startUpdates()">إبدأ الرادار</button>
        <p id="status" style="font-size: 12px; color: #555;">الحالة: جاهز</p>
    </div>

    <script>
        async function getSignal() {
            try {
                // إضافة رقم عشوائي للرابط لمنع المتصفح من حفظ النسخة القديمة
                const url = "https://raw.githubusercontent.com/Hamzahassou/xbit-radar/main/data.json?v=" + Math.random();
                const response = await fetch(url, { cache: 'no-store' });
                const data = await response.json();
                document.getElementById('number').innerText = data.signal + "x";
                document.getElementById('status').innerText = "آخر تحديث: " + new Date().toLocaleTimeString();
            } catch (e) {
                console.log("جاري البحث عن إشارة...");
            }
        }

        function startUpdates() {
            document.getElementById('status').innerText = "الحالة: متصل بالرادار...";
            setInterval(getSignal, 2000); // تحديث كل ثانيتين
        }
    </script>
</body>
</html>
