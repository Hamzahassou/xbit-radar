<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK INJECTION V12</title>
    <style>
        body { background:#000; color:#ff0000; font-family:monospace; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
        .box { border:2px solid #ff0000; border-radius:20px; padding:30px; text-align:center; width:280px; box-shadow:0 0 20px #ff0000; position:relative; }
        .skull { font-size:50px; filter:drop-shadow(0 0 10px #ff0000); animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.5;} }
        .circle { width:140px; height:140px; border:3px solid #ff0000; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:20px auto; box-shadow:inset 0 0 15px #ff0000, 0 0 15px #ff0000; }
        #prediction { font-size:45px; font-weight:bold; }
        .btn { background:#ff0000; color:#000; border:none; padding:12px 25px; border-radius:20px; font-weight:bold; cursor:pointer; width:100%; }
        #rocket { position:absolute; top:-15px; right:-15px; font-size:30px; display:none; animation:vib 0.1s infinite; }
        @keyframes vib { 0% {transform:translate(0);} 50% {transform:translate(2px,-2px);} 100% {transform:translate(0);} }
    </style>
</head>
<body>
    <div class="box">
        <div id="rocket">🚀</div>
        <div class="skull">💀</div>
        <div style="font-size:10px; margin-bottom:10px;">HAMZA_DARK_V12</div>
        <div class="circle"><div id="prediction">--x</div></div>
        <button class="btn" onclick="start()">ACTIVATE RADAR</button>
        <div id="st" style="font-size:9px; margin-top:10px;">SYSTEM READY</div>
    </div>
    <script>
        const URL = 'https://raw.githubusercontent.com/Hamzahassou/xbit-radar/main/data.json';
        async function update() {
            try {
                const r = await fetch(`${URL}?t=${Date.now()}`); // كسر الكاش لظهور الأرقام
                const d = await r.json();
                if(d.signal) document.getElementById('prediction').innerText = d.signal + "x";
            } catch(e) {}
        }
        function start() {
            document.getElementById('rocket').style.display = 'block';
            document.getElementById('st').innerText = "INJECTING...";
            setInterval(update, 1500);
            update();
        }
    </script>
</body>
</html>
