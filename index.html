<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK INJECTION V12</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            border: 2px solid #ff0000;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            width: 300px;
            box-shadow: 0 0 20px #ff0000;
            position: relative;
        }

        .skull {
            font-size: 50px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px #ff0000);
        }

        .version {
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .circle {
            width: 150px;
            height: 150px;
            border: 3px solid #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: inset 0 0 15px #ff0000, 0 0 15px #ff0000;
        }

        #prediction {
            font-size: 40px;
            font-weight: bold;
        }

        .btn {
            background-color: #ff0000;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px #ff0000;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 5px #ff0000;
        }

        #status {
            margin-top: 20px;
            font-size: 10px;
            letter-spacing: 1px;
        }

        #rocket {
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 30px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="rocket">🚀</div>
        <div class="skull">💀</div>
        <div class="version">DARK_INJECTION_V12</div>
        
        <div class="circle">
            <div id="prediction">-- X</div>
        </div>

        <button class="btn" onclick="activateRadar()">ACTIVATE RADAR</button>
        
        <div id="status">SYSTEM IDLE</div>
    </div>

    <script>
        // الرابط المباشر لملفك على GitHub
        const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/Hamzahassou/xbit-radar/main/data.json';

        async function updateSignal() {
            try {
                // إضافة متغير الوقت (Date.now) يجبر المتصفح على جلب الرقم الجديد فوراً وتخطي الكاش
                const response = await fetch(`${GITHUB_RAW_URL}?t=${Date.now()}`);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                if (data.signal) {
                    // تحديث الرقم في الدائرة
                    document.getElementById('prediction').innerText = data.signal + "x";
                }
            } catch (error) {
                console.error("خطأ في الاتصال بالرادار:", error);
            }
        }

        function activateRadar() {
            // 1. تفعيل المؤثرات البصرية
            document.getElementById('rocket').style.display = 'block';
            document.getElementById('status').innerText = "STATUS: INJECTING SIGNALS...";
            
            // 2. تشغيل التحديث التلقائي كل ثانية واحدة لضمان السرعة
            setInterval(updateSignal, 1000); 
            
            // جلب أول رقم فوراً عند الضغط
            updateSignal();
        }
    </script>
</body>
</html>
