<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAMZA APPLE PRO V3</title>
    <style>
        :root {
            --primary: #ffcc00;
            --success: #00ff00;
            --bg-dark: #010a08;
            --bg-light: #012a1f;
            --glow: rgba(0, 255, 0, 0.8);
            --panel-bg: rgba(0, 0, 0, 0.7);
        }

        body {
            background: var(--bg-dark);
            background-image: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-dark) 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding-top: 30px;
            overflow-x: hidden;
            direction: rtl;
        }

        /* تأثير نبض قوي عام */
        @keyframes strongPulse {
            0% { box-shadow: 0 0 15px var(--glow); transform: scale(1); }
            50% { box-shadow: 0 0 40px var(--glow), 0 0 10px #fff; transform: scale(1.05); }
            100% { box-shadow: 0 0 15px var(--glow); transform: scale(1); }
        }

        .header {
            font-size: 14px;
            color: var(--primary);
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--primary);
            margin-bottom: 25px;
            font-weight: bold;
        }

        /* شبكة اللعبة - مرتبة ومزخرفة */
        .game-grid {
            display: flex;
            flex-direction: column-reverse;
            width: 300px;
            margin: 0 auto;
            gap: 8px;
            perspective: 1000px; /* تأثير ثلاثي الأبعاد بسيط */
        }

        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            position: relative;
            backface-visibility: hidden;
        }
        
        .level-indicator {
            width: 45px;
            color: var(--success);
            font-size: 14px;
            font-weight: bold;
            text-align: right;
            margin-right: 10px;
            text-shadow: 0 0 5px var(--success);
        }

        .box {
            width: 54px;
            height: 54px;
            background: #6f3a0c;
            border-radius: 12px;
            border: 2px solid #482306;
            box-shadow: inset 0 0 20px #000, 0 4px 6px rgba(0,0,0,0.6);
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* التفاحات الفاسدة الخلفية */
        .box::before {
            content: '☠️';
            font-size: 28px;
            opacity: 0.2;
            filter: grayscale(1);
        }

        /* التفاحة السليمة - وامضة وقوية */
        .box.safe {
            background: var(--success);
            border-color: #fff;
            transform: scale(1.08);
            animation: strongPulse 2s infinite ease-in-out;
            z-items: 10;
        }
        
        .box.safe::after {
            content: '🍎';
            font-size: 34px;
            position: absolute;
            animation: popIn 0.4s ease-out;
        }
        
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        /* منطقة الأمان المستويات 1-3 */
        .row.safe-zone::after {
            content: '';
            position: absolute;
            left: 55px; /* تم تعديل القياس */
            top: -3px;
            width: 295px;
            height: 60px;
            border: 4px solid var(--primary);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255,204,0,0.7), inset 0 0 10px rgba(255,204,0,0.4);
            pointer-events: none;
            z-items: -1;
            background: rgba(255, 204, 0, 0.05);
        }

        /* لوحة التحكم الاحترافية */
        .panel {
            margin-top: 40px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px); /* تأثير الزجاج المقوى */
            padding: 25px;
            border-radius: 20px;
            width: 88%;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 15px 40px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,255,255,0.05);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .label { font-size: 14px; color: #aaa; }
        .value { font-size: 16px; font-weight: bold; }
        .value.success { color: var(--success); text-shadow: 0 0 5px var(--success); }
        .value.primary { color: var(--primary); text-shadow: 0 0 5px var(--primary); }

        /* قسم القدرة الجديد */
        .capability-section {
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .ability-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .ability-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success) 0%, #fff 100%);
            width: 92%; /* نسبة الأمان */
            box-shadow: 0 0 10px var(--success);
        }

        /* زر الجلب المطور - وامض بقوة */
        .fetch-btn {
            background: var(--primary);
            background: linear-gradient(180deg, var(--primary) 0%, #e6b800 100%);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.6, -0.28, 0.735, 0.045);
            box-shadow: 0 6px 15px rgba(255,204,0,0.5);
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: strongPulse 2.5s infinite ease-in-out; /* نفس الوميض القوي */
        }
        
        .fetch-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,204,0,0.8);
        }
        
        .fetch-btn:active {
            transform: translateY(1px);
            box-shadow: 0 3px 10px rgba(255,204,0,0.5);
        }
        
        .fetch-btn.loading {
            background: #555;
            color: #ccc;
            cursor: wait;
            animation: none;
            box-shadow: none;
        }

        /* تذييل الصفحة - المطور */
        .footer {
            margin-top: 30px;
            padding-bottom: 20px;
            font-size: 11px;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .dev-name {
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 5px #fff;
        }

    </style>
</head>
<body>
    <div class="header">● HAMZA APPLE PRO v3.0 // ACTIVE</div>
    
    <div class="game-grid" id="grid">
        </div>

    <div class="panel">
        <div class="info-row">
            <span class="label">المسار الآمن المقترح:</span>
            <span class="value success" id="path_text">2,1,4,4,4</span>
        </div>
        <div class="info-row">
            <span class="label">نسبة الحماية الفعالة:</span>
            <span class="value primary">~92% (إلى L3)</span>
        </div>

        <div class="capability-section">
            <div class="info-row">
                <span class="label">قدرة التحليل التحليلي:</span>
                <span class="value success">عالـية جداً</span>
            </div>
            <div class="ability-bar">
                <div class="ability-fill"></div>
            </div>
        </div>
        
        <button class="fetch-btn" id="btn" onclick="fetchNewPath()">إضغط هنا لجلب المسار التالي</button>
    </div>

    <div class="footer">
        DEVELOPER: <span class="dev-name">HAMZA</span> // HASH: Verified_By_Hamza_Pro_V3
    </div>

    <script>
        // الكود البرمجي السابق لبناء الشبكة وجلب المسارات (لا يحتاج لتعديل)
        function buildGrid(path) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let r = 1; r <= 5; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                if (r <= 3) rowDiv.classList.add('safe-zone');
                const levelDiv = document.createElement('div');
                levelDiv.className = 'level-indicator';
                levelDiv.innerText = 'L' + r;
                rowDiv.appendChild(levelDiv);
                for (let c = 1; c <= 5; c++) {
                    const boxDiv = document.createElement('div');
                    boxDiv.className = 'box';
                    if (path && path[r-1] === c) { boxDiv.classList.add('safe'); }
                    rowDiv.appendChild(boxDiv);
                }
                grid.appendChild(rowDiv);
            }
        }
        async function fetchNewPath() {
            const btn = document.getElementById('btn');
            const pathText = document.getElementById('path_text');
            btn.innerText = "جارِ التحليل..."; btn.classList.add('loading');
            pathText.innerText = "تحليل جديد..."; buildGrid(null); // مسح المؤقت
            try {
                const r = await fetch('data.json?refresh=' + Date.now());
                const d = await r.json();
                const pathArray = d.path.split(',').map(Number);
                pathText.innerText = d.path; buildGrid(pathArray);
            } catch(e) { pathText.innerText = "خطأ في الاتصال"; }
            finally { btn.innerText = "إضغط هنا لجلب المسار التالي"; btn.classList.remove('loading'); }
        }
        fetchNewPath(); // جلب مسار عند التحميل
    </script>
</body>
</html>
