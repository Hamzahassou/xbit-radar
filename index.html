<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMZA RADAR V12</title>
    <style>
        body { background:#000; color:#ff0000; font-family:monospace; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; overflow:hidden; }
        .box { border:2px solid #ff0000; border-radius:20px; padding:30px; text-align:center; width:280px; box-shadow:0 0 20px #ff0000; position:relative; }
        .circle { width:140px; height:140px; border:3px solid #ff0000; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:20px auto; box-shadow:inset 0 0 15px #ff0000; }
        #prediction { font-size:45px; font-weight:bold; }
        .btn { background:#ff0000; color:#000; border:none; padding:12px; border-radius:20px; font-weight:bold; cursor:pointer; width:100%; transition: 0.3s; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        #st { font-size:10px; margin-top:10px; color: #555; }
    </style>
</head>
<body>
    <div class="box">
        <div style="font-size:40px;">💀</div>
        <div style="font-size:10px; color:#ff0000;">HAMZA_DARK_V12</div>
        <div class="circle"><div id="prediction">--x</div></div>
        <button class="btn" onclick="start()">ACTIVATE RADAR</button>
        <div id="st">READY TO CONNECT</div>
    </div>

    <script>
        // الرابط المباشر (Raw) لضمان عدم حدوث تعليق في الأرقام
        const dataUrl = 'https://raw.githubusercontent.com/Hamzahassou/xbit-radar/main/data.json';

        async function update() {
            try {
                // استخدام t=Date.now لإجبار المتصفح على جلب أحدث رقم مرفوع
                const response = await fetch(`${dataUrl}?t=${Date.now()}`);
                const data = await response.json();
                if(data.signal) {
                    document.getElementById('prediction').innerText = data.signal + "x";
                    document.getElementById('st').innerText = "LIVE SIGNAL: RECEIVED ✅";
                    document.getElementById('st').style.color = "#00ff00";
                }
            } catch(e) {
                document.getElementById('st').innerText = "RECONNECTING...";
                document.getElementById('st').style.color = "#ff0000";
            }
        }

        function start() {
            document.getElementById('st').innerText = "INJECTING SIGNALS...";
            setInterval(update, 2000); // تحديث كل ثانيتين
            update();
        }
    </script>
</body>
</html>
