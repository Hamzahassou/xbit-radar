<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMZA PRO RADAR</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding-top: 50px; overflow: hidden; }
        .radar { width: 250px; height: 250px; border: 3px solid #ff0000; border-radius: 50%; margin: 0 auto; position: relative; box-shadow: 0 0 25px #ff0000; }
        .beam { position: absolute; width: 50%; height: 3px; background: linear-gradient(to right, transparent, #ff0000); top: 50%; left: 50%; transform-origin: left; animation: scan 2s linear infinite; }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .result { font-size: 60px; font-weight: bold; color: #fff; text-shadow: 0 0 15px #ff0000; margin-top: 20px; }
        .status { color: #0f0; font-size: 12px; letter-spacing: 2px; }
        .hash-box { font-size: 10px; color: #555; background: #111; padding: 10px; margin-top: 30px; border-radius: 5px; width: 85%; margin-left: auto; margin-right: auto; word-break: break-all; }
    </style>
</head>
<body>
    <div class="status">● LIVE CONNECTION ACTIVE</div>
    <div class="radar"><div class="beam"></div></div>
    <div class="result" id="sig">0.00x</div>
    <div class="hash-box" id="h">SHA-256: Waiting...</div>

    <script>
        async function update() {
            try {
                // منع التخزين المؤقت لضمان حداثة البيانات
                const res = await fetch('data.json?v=' + Date.now());
                const data = await res.json();
                document.getElementById('sig').innerText = data.signal + "x";
                document.getElementById('h').innerText = "HASH: " + data.hash;
            } catch(e) {}
        }
        setInterval(update, 3000); // تحديث الواجهة كل 3 ثوانٍ
    </script>
</body>
</html>
