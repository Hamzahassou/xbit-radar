<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HAMZA RADAR V9</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: radial-gradient(circle, #0a0a0a, #000); color: white; text-align: center; font-family: 'Arial', sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .rocket-container { font-size: 80px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #res { font-size: 65px; font-weight: bold; color: #00ff00; text-shadow: 0 0 20px #00ff00; margin: 10px 0; }
        .box { border: 2px solid #333; padding: 20px; border-radius: 20px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); width: 80%; }
        .brand { color: #555; letter-spacing: 3px; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="rocket-container">🚀</div>
    <div class="box">
        <div style="color: #aaa;">CURRENT PREDICTION</div>
        <div id="res">LOADING...</div>
        <div style="font-size: 14px; color: #00ff00;">● LIVE CONNECTION ACTIVE</div>
    </div>
    <div class="brand">BY HAMZA AMKOM</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // قراءة الرقم المحقون في الرابط
        const params = new URLSearchParams(window.location.search);
        const signal = params.get('val');
        
        if (signal) {
            document.getElementById('res').innerText = signal + "x";
        } else {
            document.getElementById('res').innerText = "1.00x";
        }
    </script>
</body>
</html>
