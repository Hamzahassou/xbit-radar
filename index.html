<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار حمزة المباشر</title>
    <style>
        body { background-color: #060606; color: white; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        .rocket-img { font-size: 100px; animation: bounce 2s infinite; }
        .card { background: #1a1a1a; border: 2px solid #2ecc71; border-radius: 20px; padding: 30px; display: inline-block; box-shadow: 0 0 20px #2ecc7155; }
        h2 { color: #888; font-size: 18px; margin-bottom: 10px; }
        #prediction { font-size: 70px; font-weight: bold; color: #2ecc71; text-shadow: 0 0 15px #2ecc71; }
        .status { margin-top: 15px; font-size: 12px; color: #2ecc71; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

    <div class="rocket-img">🚀</div>
    
    <div class="card">
        <h2>1XBET CRASH PREDICTION</h2>
        <div id="prediction">--X</div>
        <div class="status">● LIVE ANALYSIS ACTIVE</div>
    </div>

    <script>
        // رابط ملف البيانات الخاص بك على GitHub (تأكد من صحة الرابط)
        const dataUrl = "https://raw.githubusercontent.com/Hamzahassou/xbit-radar/main/data.json";

        async function updateResult() {
            try {
                // إضافة رقم عشوائي للرابط لمنع المتصفح من تخزين النتيجة القديمة (Cache)
                const response = await fetch(dataUrl + "?t=" + new Date().getTime());
                const data = await response.json();
                
                // تحديث الرقم في الواجهة
                if(data.signal) {
                    document.getElementById('prediction').innerText = data.signal + "x";
                }
            } catch (error) {
                console.log("في انتظار التحديث من ترمكس...");
            }
        }

        // فحص الملف كل 3 ثوانٍ لجلب أي رقم جديد يرفعه ترمكس
        setInterval(updateResult, 3000);
        updateResult(); // تشغيل أولي
    </script>
</body>
</html>
