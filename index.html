<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMZA PRO RADAR V3.5</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding-top: 40px; }
        .radar-container { width: 260px; height: 260px; border: 3px solid #ff0000; border-radius: 50%; margin: 0 auto; position: relative; box-shadow: 0 0 30px #ff0000; }
        .scan { position: absolute; width: 50%; height: 3px; background: linear-gradient(to right, transparent, #ff0000); top: 50%; left: 50%; transform-origin: left; animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .signal { font-size: 65px; font-weight: 900; margin-top: 20px; text-shadow: 0 0 15px #ff0000; }
        .counter-box { background: rgba(0, 255, 0, 0.1); border: 1px solid #0f0; color: #0f0; padding: 10px; border-radius: 10px; width: 80%; margin: 20px auto; font-size: 14px; font-weight: bold; }
        .hash { font-size: 9px; color: #333; margin-top: 20px; }
    </style>
</head>
<body>
    <div style="font-size: 12px; color: #ff0000; letter-spacing: 3px; margin-bottom: 15px;">● LIVE ANALYSIS ACTIVE</div>
    <div class="radar-container"><div class="scan"></div></div>
    <div class="signal" id="sig">...</div>
    <div class="counter-box">🎯 إجمالي الحالات الناجحة: <span id="acc">0</span></div>
    <div class="hash" id="h">SHA-256: Initializing...</div>

    <script>
        async function refresh() {
            try {
                const r = await fetch('data.json?cache=' + Date.now());
                const d = await r.json();
                document.getElementById('sig').innerText = d.signal + "x";
                document.getElementById('acc').innerText = d.accuracy;
                document.getElementById('h').innerText = "HASH: " + d.hash;
            } catch(e) {}
        }
        setInterval(refresh, 3000);
    </script>
</body>
</html>
