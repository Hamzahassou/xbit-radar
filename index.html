<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAMZA DRAGON PRO V4.5</title>
    <style>
        :root {
            --dragon-fire: #ff4500;
            --neon-green: #00ff41;
            --gold: #ffcc00;
        }

        body {
            background: #050505;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            direction: rtl;
        }

        /* حاوية التنين المتحرك (سينمائي) */
        .dragon-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            opacity: 0.15;
            width: 100%;
            pointer-events: none;
            animation: dragonFly 10s infinite ease-in-out;
        }

        @keyframes dragonFly {
            0%, 100% { transform: translate(-50%, -52%) scale(1); filter: hue-rotate(0deg); }
            50% { transform: translate(-50%, -48%) scale(1.1); filter: hue-rotate(20deg); }
        }

        .header-title {
            font-size: 22px;
            font-weight: 900;
            color: var(--dragon-fire);
            text-shadow: 0 0 15px var(--dragon-fire);
            margin: 20px 0;
            letter-spacing: 3px;
        }

        .grid {
            display: grid;
            gap: 10px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--dragon-fire);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.2);
            backdrop-filter: blur(5px);
        }

        .row { display: grid; grid-template-columns: 40px repeat(5, 55px); gap: 10px; align-items: center; }
        .lvl { color: var(--gold); font-weight: bold; }

        .cell {
            width: 55px;
            height: 55px;
            background: rgba(30, 10, 0, 0.8);
            border: 1px solid #441100;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s;
        }

        /* تفاحة نارية متحركة */
        .cell.safe {
            background: rgba(255, 69, 0, 0.3);
            border-color: var(--dragon-fire);
            box-shadow: 0 0 20px var(--dragon-fire);
            animation: firePulse 0.8s infinite alternate;
        }

        @keyframes firePulse {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.1); filter: brightness(1.5); }
        }

        .cell.safe::after { content: '🔥'; font-size: 30px; }

        /* لوحة التحكم */
        .panel {
            width: 90%;
            max-width: 350px;
            margin-top: 30px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(45deg, #ff4500, #ff8c00);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(255, 69, 0, 0.4);
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--dragon-fire); }

        .dev-tag { margin-top: 20px; font-size: 14px; color: #666; }
        .dev-tag span { color: var(--dragon-fire); font-weight: bold; }
    </style>
</head>
<body>

    <img src="https://www.svgrepo.com/show/244302/dragon.svg" class="dragon-bg" alt="dragon">

    <div class="header-title">DRAGON RADAR V4.5 PRO</div>

    <div class="grid" id="grid"></div>

    <div class="panel">
        <button class="btn" onclick="loadPath()">استدعاء قوة التنين</button>
        <div class="dev-tag">ENGINEERED BY: <span>HAMZA PRO</span></div>
    </div>

    <script>
        function draw(path = [1, 1, 1, 1, 1]) {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            for (let r = 5; r >= 1; r--) {
                const row = document.createElement('div');
                row.className = 'row';
                const label = document.createElement('div');
                label.className = 'lvl'; label.innerText = 'L' + r;
                row.appendChild(label);
                for (let c = 1; c <= 5; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (path[5-r] === c) cell.classList.add('safe');
                    row.appendChild(cell);
                }
                g.appendChild(row);
            }
        }

        async function loadPath() {
            const b = document.querySelector('.btn');
            b.innerText = "جارِ حرق الحماية...";
            try {
                const res = await fetch('data.json?v=' + Date.now());
                const data = await res.json();
                draw(data.path.split(',').map(Number));
            } catch (e) { console.log("error"); }
            finally { b.innerText = "استدعاء قوة التنين"; }
        }
        draw();
    </script>
</body>
</html>
