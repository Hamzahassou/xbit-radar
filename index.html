<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .radar { width: 240px; height: 240px; border: 4px solid #ff0000; border-radius: 50%; margin: 0 auto; position: relative; box-shadow: 0 0 25px #ff0000; }
        .beam { position: absolute; width: 50%; height: 4px; background: linear-gradient(to right, transparent, #ff0000); top: 50%; left: 50%; transform-origin: left; animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .val { font-size: 75px; font-weight: bold; color: #fff; margin: 25px 0; text-shadow: 0 0 15px #ff0000; }
        .box { border: 1px solid #0f0; color: #0f0; padding: 10px; width: 80%; margin: 0 auto; border-radius: 10px; background: rgba(0,255,0,0.05); }
    </style>
</head>
<body>
    <div style="color:#ff0000; font-size:10px; letter-spacing:3px; margin-bottom:15px;">● LOGIC ANALYSIS ACTIVE</div>
    <div class="radar"><div class="beam"></div></div>
    <div class="val" id="sig">...</div>
    <div class="box">🎯 الحالات المضمونة اليوم: <span id="acc">0</span></div>
    
    <script>
        async function update() {
            const r = await fetch('data.json?v=' + Date.now());
            const d = await r.json();
            document.getElementById('sig').innerText = d.signal + "x";
            document.getElementById('acc').innerText = d.accuracy;
        }
        setInterval(update, 3000);
    </script>
</body>
</html>
